name: UpThere
options:
  bundleIdPrefix: com.moritzwade
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    iPadOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  UpThere:
    type: application
    platform: iOS
    sources:
      - path: UpThere
        excludes:
          - "**/*.macos.swift"
          - "**/*.ios.swift"
    settings:
      base:
        INFOPLIST_FILE: UpThere/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.moritzwade.upthere
        PRODUCT_NAME: UpThere
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES

  UpThereMac:
    type: application
    platform: macOS
    sources:
      - path: UpThere
        excludes:
          - "**/*.ios.swift"
    settings:
      base:
        INFOPLIST_FILE: UpThere/Resources/Info.macOS.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.moritzwade.upthere
        PRODUCT_NAME: UpThere
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES

schemes:
  UpThere:
    build:
      targets:
        UpThere: all
        UpThereMac: all
    run:
      config: Debug
    archive:
      config: Release
